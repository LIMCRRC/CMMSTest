<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SCS Window Glass Status Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles-window.css">
</head>
<body>
<script>
(function() {
  const username = localStorage.getItem('maintenanceUser');
  const name = localStorage.getItem('userFullName');
  const position = localStorage.getItem('userPosition');

  if (!username) {
    window.location.href = "index.html";
  } else {
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("loggedInName").textContent = name;
      document.getElementById("loggedInPosition").textContent = position;
    });
  }
})();
</script>  
<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay" style="display: none;">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading data...</div>
</div>

<!-- Sidebar Options -->
<div class="options-sidebar">
  <div class="sidebar-header"><h2>SCS Dashboard</h2></div>
  <div class="user-info">
    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
    <div class="user-details">
      <div class="user-name" id="loggedInName">Loading...</div>
      <div class="user-position" id="loggedInPosition">Loading...</div>
    </div>
  </div>
  <div class="sidebar-section">
    <ul class="options-list">
      <li class="option-item"><a href="#" class="option-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i><span>Refresh Data</span></a></li>
      <li class="option-item"><a href="#" class="option-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
    </ul>
  </div>
    <!-- Status Section -->
  <div class="sidebar-section">
    <div class="section-header"><i class="fas fa-clipboard-list"></i><h3>Status</h3></div>
    <ul class="options-list">
      <li class="option-item"><a href="window.html" class="option-btn active"><i class="fas fa-window-maximize"></i><span>Window Glass</span></a></li>
    </ul>
  </div>
</div>

<div class="main-content">
  <h1>Window Glass Status Management</h1>

  <div class="summary-cards" id="summaryCards"></div>

  <div class="card">
    <div class="card-header"><h2>Train Selection</h2></div>
    <div class="form-group">
      <label for="trainSelect">Select Train Set:</label>
      <select id="trainSelect"></select>
    </div>
  </div>

  <!-- New container for all six carriages -->
  <div class="card" id="trainCarriagesCard">
    <div class="card-header"><h2>Train Carriages</h2></div>
    <div id="trainCarriages" class="train-carriages-container"></div>
  </div>

  <div class="card">
    <div class="card-header"><h2>Status Legend</h2></div>
    <div class="status-legend">
      <div class="status-badge normal"><i class="fas fa-square"></i> Normal</div>
      <div class="status-badge damaged"><i class="fas fa-square"></i> Damaged</div>
      <div class="status-badge repaired"><i class="fas fa-square"></i> Repaired</div>
      <div class="status-badge water"><i class="fas fa-square"></i> Water Issue</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><h2>Notes</h2></div>
    <div class="form-group">
      <textarea id="trainNotes" rows="4" placeholder="Add any additional notes..."></textarea>
    </div>
    <div class="btn-group">
      <button id="saveBtn" class="btn btn-primary"><i class="fas fa-save"></i> Save to Database</button>
    </div>
    <div id="statusMessage" class="status-message"></div>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
  <div class="loading-spinner" role="status" aria-hidden="true"></div>
  <div class="loading-text" id="loadingText">Processing...</div>
</div>

<script src="script-window.js"></script>
</body>
</html>
